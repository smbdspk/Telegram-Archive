name: Tests

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths: ['src/**', 'tests/**', 'scripts/**', 'alembic/**', '*.py', 'pyproject.toml', 'requirements*.txt', 'uv.lock', 'Dockerfile*', 'docker-compose.yml', '.github/workflows/tests.yml']
  pull_request:
    branches: [main, master]
    paths: ['src/**', 'tests/**', 'scripts/**', 'alembic/**', '*.py', 'pyproject.toml', 'requirements*.txt', 'uv.lock', 'Dockerfile*', 'docker-compose.yml', '.github/workflows/tests.yml']

jobs:
  test:
    runs-on: [self-hosted, Linux, X64]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio beautifulsoup4 Pillow
      
      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short
      
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true
